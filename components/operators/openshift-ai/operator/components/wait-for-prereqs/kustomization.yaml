apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - namespace-presync.yaml
  - wait-for-prereqs-job.yaml

generatorOptions:
  disableNameSuffixHash: true
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded

configMapGenerator:
  - name: wait-for-prereqs
    namespace: redhat-ods-operator-presync
    files:
      - wait-for-prereqs.sh
